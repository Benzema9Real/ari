<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Можно познакомиться? 😏</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;

    /* ЯРКИЙ ГРАДИЕНТ */
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
}

/* Карточка */
.card {
    width: 400px;
    height: 300px;
    position: relative;
    text-align: center;
    border-radius: 20px;

    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);

    padding-top: 40px;
}

/* Заголовок */
h1 {
    font-size: 26px;
    margin-bottom: 30px;
    animation: float 2s ease-in-out infinite;
}

/* Кнопки */
button {
    padding: 12px 25px;
    font-size: 16px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

/* Да */
#yes {
    background: linear-gradient(45deg, #00dbde, #fc00ff);
    color: white;
     position: absolute;
}

#yes:hover {
    transform: scale(1.1);

}

/* Нет */
#no {
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    color: white;
    position: absolute;
}

/* Текст */
#beg {
    margin-top: 15px;
    color: #ff2d55;
    font-size: 16px;
}
/* Анимации */
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Сердечки */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    from {
        transform: translateY(100vh);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
/* Анимации */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}
</style>
</head>

<body>

<div class="card" id="card">
    <h1>Можно с тобой познакомиться? 😏</h1>
<button id="yes" onclick="yes()" style="left:95px; top:175px;">Да 💖</button>
<button id="no" onclick="moveNo()">Нет 😢</button>

    <p id="beg"></p>
</div>

<script>

const noBtn = document.getElementById("no");
const card = document.getElementById("card");


function moveNo() {
    let cardRect = card.getBoundingClientRect();
    let btnWidth = noBtn.offsetWidth;
    let btnHeight = noBtn.offsetHeight;

    // границы внутри карточки
    let maxX = card.clientWidth - btnWidth;
    let maxY = card.clientHeight - btnHeight;

    let x = Math.random() * maxX;
    let y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    let phrases = [
        "ну почемуу 😭",
        "дай шанс 🥺",
        "я хороший 😭",
        "ну пожалуйста 😭",
        "ты точно уверена? 😢"
    ];

    document.getElementById("beg").innerText =
        phrases[Math.floor(Math.random() * phrases.length)];
}

// 👉 ДА
function yes() {
    window.location.href = "main2";
}

// 👉 начальная позиция кнопки "Нет"
window.onload = () => {
    noBtn.style.left = "220px";
    noBtn.style.top = "175px";
};


</script>

</body>
</html>
